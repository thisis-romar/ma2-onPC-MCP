[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short
markers =
    live: marks tests that require a real grandMA2 console connection (deselect with '-m "not live"')
    destructive: marks tests that modify show data (requires --destructive flag)

